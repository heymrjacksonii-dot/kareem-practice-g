<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geometry Through Motion - Math Plus Minus Relation</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#3B82F6;--blue-dim:rgba(59,130,246,0.12);--blue-bd:rgba(59,130,246,0.35);
  --bg:#09090b;--bg2:#111113;--bg3:#17171b;
  --bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.13);
  --tx:#efefef;--tx2:#8888a0;--tx3:#505060;
  --green:#22c55e;--gdim:rgba(34,197,94,0.11);--gbd:rgba(34,197,94,0.3);
  --red:#f87171;--rdim:rgba(248,113,113,0.1);--rbd:rgba(248,113,113,0.32);
  --amber:#f59e0b;--adim:rgba(245,158,11,0.12);--abd:rgba(245,158,11,0.35);
  --purple:#a78bfa;--pdim:rgba(167,139,250,0.11);--pbd:rgba(167,139,250,0.3);
  --mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;
}
html,body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100%}
body{display:flex;flex-direction:column;align-items:center;padding:0 16px 80px}
nav{width:100%;max-width:700px;display:flex;justify-content:space-between;align-items:center;padding:22px 0 18px;border-bottom:.5px solid var(--bdr);margin-bottom:0}
.logo{font-family:var(--mono);font-size:12px;color:var(--tx2)}.logo b{color:var(--blue)}
.nav-r{font-family:var(--mono);font-size:11px;color:var(--tx3)}
.prog{width:100%;max-width:700px;padding:14px 0 0}
.pips{display:flex;gap:4px;margin-bottom:6px}
.pip{height:3px;flex:1;border-radius:2px;background:var(--bg3);transition:background .4s}
.pip.done{background:var(--blue)}.pip.now{background:rgba(59,130,246,.45)}
.plabel{font-family:var(--mono);font-size:9px;letter-spacing:.08em;color:var(--tx3);text-transform:uppercase}
.page{width:100%;max-width:700px;padding-top:28px;display:none}
.page.on{display:block}
h1{font-size:26px;font-weight:500;line-height:1.3;margin-bottom:12px;color:var(--tx)}
h2{font-size:19px;font-weight:500;margin-bottom:10px;color:var(--tx)}
.sub{font-size:14px;color:var(--tx2);line-height:1.8;margin-bottom:20px}
.card{background:var(--bg2);border:.5px solid var(--bdr2);border-radius:14px;padding:22px;margin-bottom:12px}
.ey{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
.ey.bl{color:var(--blue)}.ey.am{color:var(--amber)}.ey.gr{color:var(--green)}.ey.pu{color:var(--purple)}
.btn{display:inline-block;padding:13px 26px;font-family:var(--mono);font-size:12px;letter-spacing:.07em;font-weight:700;text-transform:uppercase;cursor:pointer;border-radius:9px;background:var(--blue);color:#fff;border:none;transition:background .15s}
.btn:hover{background:#2563eb}
.btn-o{background:transparent;color:var(--blue);border:.5px solid var(--blue-bd)}
.btn-o:hover{background:var(--blue-dim)}
.btn-wide{width:100%;padding:13px;margin-top:12px;display:none}
.btn-wide.on{display:block}
.opt-btn{width:100%;text-align:left;padding:13px 16px;margin-bottom:8px;font-size:14px;font-family:var(--sans);color:var(--tx2);background:var(--bg2);border:.5px solid var(--bdr);border-radius:9px;cursor:pointer;transition:all .12s}
.opt-btn:hover:not(:disabled){background:var(--bg3);border-color:var(--bdr2);color:var(--tx)}
.opt-btn.sel{background:var(--blue-dim);border-color:var(--blue-bd);color:var(--blue)}
.opt-btn.ok{background:var(--gdim);border-color:var(--gbd);color:var(--green)}
.opt-btn.no{background:var(--rdim);border-color:var(--rbd);color:var(--red)}
.opt-btn:disabled{cursor:default}
.fb{padding:12px 15px;border-radius:9px;border-left:2px solid;font-size:13px;line-height:1.7;font-family:var(--mono);margin-top:8px;display:none}
.fb.ok{background:var(--gdim);border-color:var(--green);color:var(--green)}
.fb.no{background:var(--rdim);border-color:var(--red);color:var(--red)}
.fb.show{display:block}
.scene{font-family:var(--mono);font-size:13px;color:var(--tx2);line-height:2;padding:15px;background:var(--bg3);border-radius:9px;border-left:2px solid var(--blue);margin-bottom:16px}
.scene b{color:var(--tx)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.chip{background:var(--bg3);border:.5px solid var(--bdr);border-radius:7px;padding:9px 12px;font-family:var(--mono);font-size:12px;color:var(--blue);display:flex;align-items:center;gap:7px}
.chip::before{content:'\2713';opacity:.6}
/* explorer */
.ex-wrap{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px}
.ex-svg{flex:0 0 260px}
.ex-parts{flex:1;min-width:200px}
.ex-part{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg2);border:.5px solid var(--bdr);border-radius:9px;cursor:pointer;margin-bottom:8px;transition:all .15s}
.ex-part:hover{background:var(--bg3);border-color:var(--bdr2)}
.ex-part.on{background:var(--blue-dim);border-color:var(--blue-bd)}
.ex-icon{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;flex-shrink:0}
.ex-name{font-size:13px;font-weight:500;color:var(--tx)}
.ex-detail{background:var(--bg2);border:.5px solid var(--bdr2);border-radius:14px;padding:18px;margin-top:0;min-height:110px}
.ex-dtitle{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:7px}
.ex-dbody{font-size:13px;color:var(--tx2);line-height:1.75;font-family:var(--mono)}
.ex-formula{display:inline-block;font-family:var(--mono);font-size:13px;font-weight:700;padding:5px 12px;border-radius:6px;margin-top:10px}
.ef-bl{color:var(--blue);background:var(--blue-dim);border:.5px solid var(--blue-bd)}
.ef-pu{color:var(--purple);background:var(--pdim);border:.5px solid var(--pbd)}
.ef-gr{color:var(--green);background:var(--gdim);border:.5px solid var(--gbd)}
.ef-re{color:var(--red);background:var(--rdim);border:.5px solid var(--rbd)}
/* levels */
.lv-badge{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:4px;border:.5px solid;margin-bottom:14px;display:inline-block}
.lv1{color:var(--green);border-color:var(--gbd);background:var(--gdim)}
.lv2{color:var(--blue);border-color:var(--blue-bd);background:var(--blue-dim)}
.lv3,.lv4{color:var(--amber);border-color:var(--abd);background:var(--adim)}
.lv5,.lv6{color:var(--purple);border-color:var(--pbd);background:var(--pdim)}
.work{background:var(--bg3);border:.5px solid var(--bdr);border-radius:9px;padding:13px 15px;margin-top:10px;display:none}
.work.show{display:block}
.wline{font-family:var(--mono);font-size:13px;color:var(--tx2);margin-bottom:5px;display:flex;gap:7px}
.wline:last-child{color:var(--green);font-weight:700;margin-bottom:0}
.dots{display:flex;gap:5px;margin-bottom:16px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--bg3);border:.5px solid var(--bdr);transition:background .3s}
.dot.done{background:var(--blue);border-color:var(--blue-bd)}
.dot.now{background:rgba(59,130,246,.4);border-color:var(--blue-bd)}
/* concept */
.cstep{background:var(--bg2);border:.5px solid var(--bdr2);border-radius:14px;padding:20px;margin-bottom:12px}
.cstep-n{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--blue);text-transform:uppercase;margin-bottom:9px}
.cstep-q{font-size:14px;font-weight:500;color:var(--tx);margin-bottom:12px;line-height:1.5}
.rev-ans{background:var(--bg3);border-radius:9px;padding:13px 15px;font-family:var(--mono);font-size:13px;color:var(--tx2);line-height:1.7;display:none;border-left:2px solid var(--blue);margin-top:9px}
.rev-ans.show{display:block}
.rev-btn{padding:7px 15px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;font-weight:700;text-transform:uppercase;cursor:pointer;border-radius:7px;background:var(--bg3);color:var(--tx2);border:.5px solid var(--bdr2);transition:all .15s}
.rev-btn:hover{background:var(--blue-dim);color:var(--blue);border-color:var(--blue-bd)}
/* scout */
.sc-head{text-align:center;padding:28px 0 20px}
.sc-badge{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--blue);text-transform:uppercase;padding:5px 15px;border-radius:4px;background:var(--blue-dim);border:.5px solid var(--blue-bd);margin-bottom:14px}
.sc-big{font-family:var(--mono);font-size:54px;font-weight:700;color:var(--tx);line-height:1;margin-bottom:4px}
.sc-pct{font-family:var(--mono);font-size:20px;color:var(--tx3);margin-bottom:20px}
.sc-profile{display:inline-block;padding:7px 18px;border-radius:9px;font-family:var(--mono);font-size:12px;font-weight:700;margin-bottom:7px}
.pr-ready{background:var(--gdim);color:var(--green);border:.5px solid var(--gbd)}
.pr-build{background:var(--blue-dim);color:var(--blue);border:.5px solid var(--blue-bd)}
.pr-pract{background:var(--pdim);color:var(--purple);border:.5px solid var(--pbd)}
.pr-found{background:var(--adim);color:var(--amber);border:.5px solid var(--abd)}
.sc-pdesc{font-size:13px;color:var(--tx2);max-width:400px;margin:0 auto 24px;line-height:1.7}
.dim-row{display:flex;align-items:center;gap:12px;background:var(--bg2);border:.5px solid var(--bdr);border-radius:9px;padding:11px 15px;margin-bottom:8px}
.dim-lbl{font-size:12px;color:var(--tx2);font-family:var(--mono);min-width:120px}
.dim-bar-w{flex:1;background:var(--bg3);border-radius:3px;height:5px;overflow:hidden}
.dim-bar{height:100%;border-radius:3px}
.dim-st{font-family:var(--mono);font-size:10px;min-width:90px;text-align:right}
.ds-str{color:var(--green)}.ds-dev{color:var(--amber)}.ds-ned{color:var(--red)}
.sc-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sc-sect{background:var(--bg2);border:.5px solid var(--bdr2);border-radius:14px;padding:18px}
.sc-sect-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px}
.ss-w .sc-sect-lbl{color:var(--green)}.ss-g .sc-sect-lbl{color:var(--amber)}
.sc-item{display:flex;gap:7px;margin-bottom:9px;font-size:13px;color:var(--tx2);line-height:1.6;align-items:flex-start}
.sc-item:last-child{margin-bottom:0}
.si-d{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:6px}
.si-g{background:var(--green)}.si-a{background:var(--amber)}
.coach-box{background:var(--bg3);border:.5px solid var(--bdr);border-radius:14px;padding:18px;margin-bottom:12px;border-left:2px solid var(--blue)}
.coach-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--blue);margin-bottom:9px}
.coach-txt{font-size:13px;color:var(--tx2);line-height:1.8;font-style:italic}
.coach-sig{font-family:var(--mono);font-size:10px;color:var(--tx3);margin-top:9px}
.div{height:.5px;background:var(--bdr);margin:18px 0}
.philo{font-family:var(--mono);font-size:11px;color:var(--tx3);letter-spacing:.05em;line-height:2.2;text-align:center}
.philo span{color:var(--blue)}
/* mirror */
.ms{background:var(--bg2);border:.5px solid var(--bdr2);border-radius:14px;padding:22px;margin-bottom:12px;opacity:0;transform:translateY(10px);transition:opacity .5s,transform .5s}
.ms.vis{opacity:1;transform:translateY(0)}
.ms-n{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:9px}
.ms-n.bl{color:var(--blue)}.ms-n.am{color:var(--amber)}.ms-n.gr{color:var(--green)}.ms-n.pu{color:var(--purple)}
.ms-h{font-size:16px;font-weight:600;color:var(--tx);margin-bottom:11px}
.ms-b{font-size:13px;color:var(--tx2);line-height:1.85;font-family:var(--mono)}
.ms-b b{color:var(--tx)}
.ot-box{background:var(--bg3);border:.5px solid var(--bdr2);border-radius:14px;padding:20px;margin-top:12px;text-align:center;border-top:2px solid var(--blue)}
.ot-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);margin-bottom:13px}
.ot-act{font-size:15px;color:var(--tx);line-height:1.75;font-weight:500;max-width:400px;margin:0 auto}
.id-opt{display:flex;align-items:center;gap:10px;padding:12px 15px;background:var(--bg3);border:.5px solid var(--bdr);border-radius:9px;cursor:pointer;font-size:13px;color:var(--tx2);margin-bottom:7px;transition:all .15s}
.id-opt:hover{background:var(--bg3);border-color:var(--bdr2);color:var(--tx)}
.id-opt.on{background:var(--blue-dim);border-color:var(--blue-bd);color:var(--blue)}
.id-radio{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--bdr2);flex-shrink:0;transition:all .15s}
.id-opt.on .id-radio{background:var(--blue);border-color:var(--blue)}
.id-resp{background:var(--bg3);border-radius:9px;padding:13px 15px;border-left:2px solid var(--blue);font-size:13px;color:var(--tx2);line-height:1.75;font-family:var(--mono);display:none;margin-top:7px}
.id-resp.show{display:block}
/* rx */
.rx-row{display:flex;align-items:flex-start;gap:14px;margin-bottom:13px;padding-bottom:13px;border-bottom:.5px solid var(--bdr)}
.rx-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.rx-ico{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.rx-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);margin-bottom:4px}
.rx-val{font-size:14px;color:var(--tx);line-height:1.5}
.rx-sub{font-size:12px;color:var(--tx2);margin-top:2px;font-family:var(--mono)}
.promise{background:var(--bg2);border:.5px solid var(--blue-bd);border-radius:14px;padding:24px;margin-bottom:12px;position:relative;overflow:hidden}
.promise::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--blue)}
.promise-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);margin-bottom:13px}
.promise-txt{font-size:14px;color:var(--tx2);line-height:1.9;font-style:italic;margin-bottom:13px}
.promise-txt b{color:var(--tx);font-style:normal}
.promise-sig{font-family:var(--mono);font-size:10px;color:var(--tx3)}
.retrain-btn{width:100%;padding:15px;font-family:var(--mono);font-size:12px;letter-spacing:.06em;font-weight:700;text-transform:uppercase;cursor:pointer;border-radius:9px;background:var(--blue);color:#fff;border:none;margin-bottom:9px;transition:background .15s}
.retrain-btn:hover{background:#2563eb}
.restart-btn{width:100%;padding:12px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;font-weight:700;text-transform:uppercase;cursor:pointer;border-radius:9px;background:transparent;color:var(--tx3);border:.5px solid var(--bdr);transition:all .15s}
.restart-btn:hover{color:var(--tx);border-color:var(--bdr2)}
footer{width:100%;max-width:700px;padding:24px 0 0;border-top:.5px solid var(--bdr);margin-top:28px;display:flex;align-items:center;justify-content:space-between}
.f-brand{font-family:var(--mono);font-size:10px;color:var(--tx3)}.f-brand b{color:var(--blue)}
.f-link{font-family:var(--mono);font-size:10px;color:var(--tx3);text-decoration:none}
.f-link:hover{color:var(--blue)}
@media(max-width:540px){
  h1{font-size:20px}.sc-2col{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}
  .ex-wrap{flex-direction:column}.ex-svg{flex:unset;width:100%}
  footer{flex-direction:column;gap:8px;text-align:center}.dim-lbl{min-width:90px;font-size:10px}
}
</style>
</head>
<body>

<nav>
  <div class="logo">MATH <b>+/-</b> RELATION</div>
  <div class="nav-r" id="nav-r">Geometry Through Motion</div>
</nav>

<div class="prog">
  <div class="pips" id="pips">
    <div class="pip now" id="p0"></div><div class="pip" id="p1"></div>
    <div class="pip" id="p2"></div><div class="pip" id="p3"></div>
    <div class="pip" id="p4"></div><div class="pip" id="p5"></div>
    <div class="pip" id="p6"></div><div class="pip" id="p7"></div>
    <div class="pip" id="p8"></div><div class="pip" id="p9"></div>
  </div>
  <div class="plabel" id="plabel">Mission Brief</div>
</div>

<div id="pg0" class="page on"></div>
<div id="pg1" class="page"></div>
<div id="pg2" class="page"></div>
<div id="pg3" class="page"></div>
<div id="pg4" class="page"></div>
<div id="pg5" class="page"></div>
<div id="pg6" class="page"></div>
<div id="pg7" class="page"></div>
<div id="pg8" class="page"></div>
<div id="pg9" class="page"></div>

<footer>
  <div class="f-brand">MATH <b>+/-</b> RELATION</div>
  <a href="https://mathrelation.com" class="f-link" target="_blank">mathrelation.com</a>
</footer>

<script>
var CUR = 0;
var dScores = [null,null,null];
var pScores = [null,null,null,null,null,null];
var appScore = null;
var diagIdx = 0;
var lvlIdx = 0;
var visited = {};
var activePart = 'center';
var adData = null;

var labels = ['Mission Brief','Diagnostic','Circle Explorer','Concept Construction','Skill Training','Application','Reflection','Scout Report','Thinking Mirror','Prescription'];

function go(n) {
  document.getElementById('pg'+CUR).className = 'page';
  CUR = n;
  document.getElementById('pg'+CUR).className = 'page on';
  window.scrollTo({top:0,behavior:'smooth'});
  for (var i=0;i<10;i++) {
    var p = document.getElementById('p'+i);
    if (!p) continue;
    if (i<n) p.className='pip done';
    else if (i===n) p.className='pip now';
    else p.className='pip';
  }
  document.getElementById('plabel').textContent = labels[n];
  draw(n);
}

function draw(n) {
  if(n===0) drawBrief();
  else if(n===1) drawDiag();
  else if(n===2) drawExplorer();
  else if(n===3) drawConcept();
  else if(n===4) drawLevel();
  else if(n===5) drawApp();
  else if(n===6) drawReflect();
  else if(n===7) drawScout();
  else if(n===8) drawMirror();
  else if(n===9) drawRx();
}

// PHASE 0
function drawBrief() {
  document.getElementById('pg0').innerHTML =
    '<div style="text-align:center;padding:40px 0 28px">'+
    '<div style="display:inline-flex;align-items:center;gap:9px;background:var(--bg2);border:.5px solid var(--bdr2);border-radius:14px;padding:9px 18px;margin-bottom:24px;font-family:var(--mono);font-size:11px;color:var(--tx2)"><div style="width:6px;height:6px;border-radius:50%;background:var(--blue)"></div>Academy Mission 01</div>'+
    '<h1 style="font-size:32px;margin-bottom:12px">Geometry<br><span style="color:var(--blue)">Through Motion</span></h1>'+
    '<p class="sub" style="max-width:460px;margin:0 auto 28px">Before we calculate anything, we observe. This mission teaches circles through the world you already know.</p>'+
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:380px;margin:0 auto 28px">'+
    '<div style="background:var(--bg2);border:.5px solid var(--bdr);border-radius:9px;padding:14px 8px;text-align:center"><div style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--tx);margin-bottom:3px">9</div><div style="font-size:10px;color:var(--tx3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em">Phases</div></div>'+
    '<div style="background:var(--bg2);border:.5px solid var(--bdr);border-radius:9px;padding:14px 8px;text-align:center"><div style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--tx);margin-bottom:3px">5</div><div style="font-size:10px;color:var(--tx3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em">Dimensions</div></div>'+
    '<div style="background:var(--bg2);border:.5px solid var(--bdr);border-radius:9px;padding:14px 8px;text-align:center"><div style="font-family:var(--mono);font-size:14px;font-weight:700;color:var(--tx);margin-bottom:3px">Scout</div><div style="font-size:10px;color:var(--tx3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em">Report</div></div>'+
    '</div></div>'+
    '<div class="card">'+

function drawScout() {

  var tot = (d[0]||0)+(d[1]||0)+(d[2]||0)+(p[0]||0)+(p[1]||0)+(p[2]||0)+(p[3]||0)+(p[4]||0)+(p[5]||0)+a;
  var pct = Math.round((tot/10)*100);
  var profile, pcls, pdesc, cnote;
  if(pct>=85){profile='Ready to Advance';pcls='pr-ready';pdesc='Strong across all dimensions. Conceptual understanding and procedural fluency are both present.';cnote='Kareem demonstrates consistent understanding across recognition, calculation, and transfer. The foundation is solid. Recommended next step: Algebra Through Relationships.';}
  else if((d[0]||0)+(d[1]||0)>=2&&(p[2]||0)+(p[3]||0)<=1){profile='Builder';pcls='pr-build';pdesc='Strong conceptual understanding. Procedural execution needs more repetition.';cnote='The relationships are understood, which is the harder skill to develop. The gaps are in procedural execution. Focused calculation drills using known formulas will close this quickly.';}
  else if((d[0]||0)+(d[1]||0)<=1&&(p[2]||0)+(p[3]||0)>=2){profile='Practitioner';pcls='pr-pract';pdesc='Solid with calculation mechanics. Conceptual vocabulary needs reinforcement.';cnote='Procedures are reliable but the conceptual foundation needs deepening. Visualization and real-world application will make the skills more durable under pressure.';}
  else{profile='Foundation Building';pcls='pr-found';pdesc='Both conceptual understanding and procedural fluency are developing.';cnote='Consistent structured exposure will produce the most growth. Build the visualization layer first. Once the mental model is clear, the formulas follow naturally.';}
  var wins=[],growth=[];
  if((d[0]||0)+(d[1]||0)+(d[2]||0)>=2) wins.push('Vocabulary knowledge demonstrated');
  if(p[0]) wins.push('Circle parts identified correctly');
  if(p[2]) wins.push('Circumference formula applied accurately');
  if(p[3]) wins.push('Area formula with correct order of operations');
  if(a) wins.push('Real-world engineering problem solved');
  if(wins.length<2) wins.push('Completed all mission phases');
  if(!p[1]) growth.push('Radius to diameter - review the 2x rule');
  if(!p[4]) growth.push('Circumference vs area when radius changes');
  if(!p[5]) growth.push('Multi-step word problems');
  if(!a) growth.push('Real-world application transfer');
  if(growth.length===0) growth.push('Push to harder real-world problems');
  var dims = [['Knowledge',(d[0]||0+d[1]||0+d[2]||0)/3],['Recognition',((p[0]||0)+(p[4]||0))/2],['Procedure',((p[2]||0)+(p[3]||0))/2],['Reasoning',p[4]||0],['Transfer',a]];
  function dSt(v){return v>=0.85?{l:'Strong',c:'ds-str'}:v>=0.5?{l:'Developing',c:'ds-dev'}:{l:'Needs Support',c:'ds-ned'};}
  function dCl(v){return v>=0.85?'var(--green)':v>=0.5?'var(--amber)':'var(--red)';}
  document.getElementById('pg7').innerHTML =
    '<div class="sc-head">'+
    '<div class="sc-badge">Scout Report - Geometry Through Motion</div>'+
    '<p style="font-family:var(--mono);font-size:11px;color:var(--tx3);margin-bottom:10px">Mission Score</p>'+
    '<p class="sc-big">'+tot+'/10</p>'+
    '<p class="sc-pct">'+pct+'%</p>'+
    '<div class="sc-profile '+pcls+'">Thinking Profile: '+profile+'</div>'+
    '<p class="sc-pdesc">'+pdesc+'</p></div>'+
    dims.map(function(dm){var st=dSt(dm[1]);return'<div class="dim-row"><span class="dim-lbl">'+dm[0]+'</span><div class="dim-bar-w"><div class="dim-bar" style="width:'+Math.round(dm[1]*100)+'%;background:'+dCl(dm[1])+'"></div></div><span class="dim-st '+st.c+'">'+st.l+'</span></div>';}).join('')+
    '<div class="sc-2col">'+
    '<div class="sc-sect ss-w"><p class="sc-sect-lbl">Wins</p>'+wins.map(function(w){return'<div class="sc-item"><div class="si-d si-g"></div><div>'+w+'</div></div>';}).join('')+'</div>'+
    '<div class="sc-sect ss-g"><p class="sc-sect-lbl">Growth Areas</p>'+growth.map(function(g){return'<div class="sc-item"><div class="si-d si-a"></div><div>'+g+'</div></div>';}).join('')+'</div>'+
    '</div>'+
    '<div class="coach-box"><p class="coach-lbl">Coach Note</p><p class="coach-txt">'+cnote+'</p><p class="coach-sig">- Math +/- Relation Coaching System</p></div>'+
    '<div style="background:var(--bg2);border:.5px solid var(--bdr2);border-radius:14px;padding:18px;margin-bottom:12px">'+
    '<p class="ey bl">Advancement Requirement</p>'+
    '<p style="font-size:13px;color:var(--tx2);line-height:1.75;margin-bottom:12px">Target: 90% to unlock Algebra Through Relationships.</p>'+
    '<div style="background:var(--bg3);border-radius:5px;height:7px;overflow:hidden">'+
    '<div style="width:'+pct+'%;height:100%;background:'+(pct>=85?'var(--green)':pct>=60?'var(--amber)':'var(--red)')+'"></div></div>'+
    '<div style="display:flex;justify-content:space-between;margin-top:5px;font-family:var(--mono);font-size:10px;color:var(--tx3)"><span>'+pct+'%</span><span>Goal: 90%</span></div></div>'+
    '<div class="div"></div>'+
    '<p class="philo">Calm Mind. <span>Clear Steps.</span> Strong Math.</p>'+
    '<div style="text-align:center;margin-top:20px">'+
    '<button class="btn" onclick="go(8)">Enter Thinking Mirror &rarr;</button></div>'+
    '<div style="text-align:center;margin-top:10px">'+
    '<button class="btn btn-o" onclick="resetAll()">Restart Mission</button></div>';
}

// PHASE 8
function analyze() {
  var d=dScores; var p=pScores; var a=appScore||0;
  var tot=(d[0]||0)+(d[1]||0)+(d[2]||0)+(p[0]||0)+(p[1]||0)+(p[2]||0)+(p[3]||0)+(p[4]||0)+(p[5]||0)+a;
  var pct=Math.round((tot/10)*100);
  var pattern='general',wk='general';
  var pMsg,gMsg,oThing;
  var retrain={phase:4,level:0,label:'Skill Training - Level 1'};
  if(!d[0]&&!p[0]){pattern='vocabulary';wk='vocabulary';
    pMsg='Circle vocabulary is not yet automatic. The labels need to load instantly before any formula can be reliable. Center, radius, diameter, circumference, area - these need to be immediate, not searched for.';}
  else if(!d[1]&&!p[1]){pattern='substitution';wk='relationship';
    pMsg='The formula was right but the value substituted was wrong on multiple problems. This is a relationship problem, not a formula problem. Diameter = 2 x radius needs to become reflexive, not calculated.';}
  else if(!p[2]&&!p[3]){pattern='procedure';wk='procedure';
    pMsg='The conceptual layer was solid - you identified the right relationships. The error was in the execution sequence. Squaring the radius before multiplying by pi needs deliberate repetition to become automatic.';}
  else if(!p[4]&&!p[5]){pattern='reasoning';wk='reasoning';
    pMsg='Individual calculations went well. The breakdown was when two circles needed comparison, or math was embedded in a scenario. Reasoning is the last layer to develop - which means you are further along than the score shows.';}
  else if(!a){pattern='transfer';wk='transfer';
    pMsg='Guided practice was reliable. When math was placed inside an engineering scenario without visible labels, recognition slowed. Transfer is the proof of real understanding and is exactly what gets tested under pressure.';}
  else{pMsg='The error pattern is distributed across dimensions. The concept is forming but not yet automatic. Repetition just below transfer level will accelerate consolidation.';}
  if(pct>=85) gMsg='You solved almost every problem correctly. But can you explain in one sentence why doubling the radius quadruples the area? That is the gap. Not calculation. Explanation.';
  else if(pct>=60) gMsg='You recognized the formula before training began. But execution broke down mid-mission. Knowing the formula but losing it in application means it is in memory, not in understanding. When understanding drives calculation, it holds under pressure.';
  else gMsg='Vocabulary gaps appeared before you touched a single formula. The next session starts with observation and recognition, not calculation. Walk up to any circle and name every part. That comes first.';
  var otMap={
    vocabulary:'Draw a circle from memory. Label all five parts without notes: center, radius, diameter, circumference, area. If you cannot do this in 60 seconds, that is where the next session starts.',
    relationship:'Write this rule: diameter = 2 x radius, radius = diameter divided by 2. Then convert five different measurements both directions until it feels automatic, not calculated.',
    procedure:'Solve A = pi x r squared with five different radius values. Write every step. Never skip. Do this until the sequence feels like one motion.',
    reasoning:'Pick two circular objects. Calculate both circumference and area for each. Write one sentence explaining why the area difference is larger than the circumference difference.',
    transfer:'Find one circular object near you. Before calculating, identify whether the situation calls for circumference or area and explain why.',
    general:'Solve one circumference and one area problem from memory. No formula reference. Time yourself. If it takes more than 90 seconds, the structure is not yet automatic.'
  };
  oThing=otMap[pattern]||otMap['general'];
  if(wk==='vocabulary') retrain={phase:2,level:-1,label:'Circle Explorer'};
  else if(wk==='relationship') retrain={phase:3,level:-1,label:'Concept Construction'};
  else if(wk==='procedure') retrain={phase:4,level:2,label:'Skill Training - Level 3'};
  else if(wk==='reasoning') retrain={phase:4,level:4,label:'Skill Training - Level 5'};
  else if(wk==='transfer') retrain={phase:5,level:-1,label:'Application Studio'};
  var sLine='Your completion of this full mission';
  if((d[0]||0)+(p[0]||0)>=1) sLine='Your vocabulary recognition';
  else if((p[2]||0)+(p[3]||0)>=1) sLine='Your formula application';
  else if(a) sLine='Your application-level thinking';
  var promTxt='<b>'+sLine+' tells us the foundation is present.</b> The work ahead is not about intelligence. It is about making the relationships between radius, diameter, circumference, and area completely automatic. We will not move to the next academy until you can recognize them anywhere, explain without notes, and apply in problems you have never seen. When that happens you will know - because you will start seeing circles differently everywhere you go.';
  return{pMsg:pMsg,gMsg:gMsg,oThing:oThing,retrain:retrain,promTxt:promTxt,pct:pct,wk:wk};
}

function drawMirror() {
  adData = analyze();
  document.getElementById('pg8').innerHTML =
    '<div style="text-align:center;padding:28px 0 20px">'+
    '<p class="ey bl">Phase 8 - Thinking Mirror</p>'+
    '<h1>Not what happened.<br>Who you are becoming.</h1>'+
    '<p class="sub" style="text-align:center;margin:10px auto">The Scout Report showed your score. The Thinking Mirror shows your pattern.</p>'+
    '</div>'+
    '<div class="ms" id="ms1">'+
    '<p class="ms-n bl">01 - Pattern Recognition</p>'+
    '<p class="ms-h">I noticed something about how you were thinking.</p>'+
    '<p class="ms-b">'+adData.pMsg+'</p>'+
    '<div style="margin-top:12px"><span style="display:inline-block;font-family:var(--mono);font-size:11px;padding:4px 11px;border-radius:4px;border:.5px solid;color:var(--green);border-color:var(--gbd);background:var(--gdim);margin-right:6px">Computation: Present</span>'+
    '<span style="display:inline-block;font-family:var(--mono);font-size:11px;padding:4px 11px;border-radius:4px;border:.5px solid;color:var(--amber);border-color:var(--abd);background:var(--adim)">'+adData.wk.charAt(0).toUpperCase()+adData.wk.slice(1)+': Gap</span></div>'+
    '</div>'+
    '<div class="ms" id="ms2">'+
    '<p class="ms-n am">02 - The Honest Gap</p>'+
    '<p class="ms-h">Here is what the data actually says.</p>'+
    '<p class="ms-b">'+adData.gMsg+'</p>'+
    '</div>'+
    '<div class="ms" id="ms3">'+
    '<p class="ms-n gr">03 - The One Thing</p>'+
    '<p class="ms-h">One action. Not five. One.</p>'+
    '<p class="ms-b">Before your next attempt, complete this specific task:</p>'+
    '<div class="ot-box"><p class="ot-lbl">Your Assignment</p><p class="ot-act">'+adData.oThing+'</p></div>'+
    '</div>'+
    '<div class="ms" id="ms4">'+
    '<p class="ms-n pu">04 - Identity Reflection</p>'+
    '<p class="ms-h">Which statement describes how you showed up today?</p>'+
    ['I rushed through the problems',
     'I guessed on several answers',
     'I understood better after seeing the visual',
     'I could explain most of this to someone else',
     'I am still confused about one specific relationship'].map(function(txt,i){
      return '<div class="id-opt" id="ido'+i+'" onclick="pickId('+i+')"><div class="id-radio"></div><span>'+txt+'</span></div>';
    }).join('')+
    '<div class="id-resp" id="iresp"></div>'+
    '</div>'+
    '<button class="btn btn-wide" id="mnxt" style="display:none" onclick="go(9)">See My Performance Prescription &rarr;</button>';
  setTimeout(function(){var e=document.getElementById('ms1');if(e)e.className='ms vis';},200);
  setTimeout(function(){var e=document.getElementById('ms2');if(e)e.className='ms vis';},800);
  setTimeout(function(){var e=document.getElementById('ms3');if(e)e.className='ms vis';},1400);
  setTimeout(function(){var e=document.getElementById('ms4');if(e)e.className='ms vis';},2000);
}

var idR = [
  'Speed under pressure is a confidence symptom. Build the sequence until it is automatic. Then speed is earned, not forced.',
  'Guessing tells us the visual foundation is not solid yet. The next session starts with observation before any formula is introduced.',
  'Visual models are becoming one of your strongest learning tools. More visualization before procedure is the right path.',
  'If you can explain it you are close to owning it. The remaining gaps are execution-level. Deliberate practice will close them.',
  'Naming the confusion is the most useful thing you can do. That specific relationship becomes the single starting point next session.'
];

function pickId(i) {
  for(var j=0;j<5;j++){var el=document.getElementById('ido'+j);if(el)el.className='id-opt';}
  var sel=document.getElementById('ido'+i);if(sel)sel.className='id-opt on';
  var resp=document.getElementById('iresp');
  if(resp){resp.textContent=idR[i];resp.className='id-resp show';}
  var nxt=document.getElementById('mnxt');if(nxt)nxt.style.display='block';
}

// PHASE 9
function drawRx() {
  if(!adData) adData=analyze();
  var d=adData;
  var fMap={vocabulary:'Vocabulary and Recognition',relationship:'Relationship Fluency',procedure:'Procedural Execution',reasoning:'Comparative Reasoning',transfer:'Real-World Transfer',general:'Full Concept Reinforcement'};
  var tMap={vocabulary:'8 Minutes',relationship:'10 Minutes',procedure:'12 Minutes',reasoning:'15 Minutes',transfer:'12 Minutes',general:'15 Minutes'};
  var gMap={vocabulary:'Label all five circle parts from memory.',relationship:'Convert between radius and diameter automatically.',procedure:'Execute circumference and area formulas in correct sequence.',reasoning:'Explain why doubling radius quadruples area but only doubles circumference.',transfer:'Identify whether a scenario needs circumference or area before solving.',general:'Connect all five circle relationships into one coherent mental model.'};
  document.getElementById('pg9').innerHTML =
    '<div style="text-align:center;padding:24px 0 18px">'+
    '<div style="display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:5px 15px;border-radius:4px;background:var(--adim);color:var(--amber);border:.5px solid var(--abd);margin-bottom:14px">Performance Prescription</div>'+
    '<h1>Your next move is specific.</h1>'+
    '<p class="sub" style="text-align:center;margin:8px auto">Not a suggestion. A prescription based on every answer in this session.</p>'+
    '</div>'+
    '<div class="card" style="margin-bottom:12px">'+
    '<div class="rx-row"><div class="rx-ico" style="background:var(--blue-dim)">&#9679;</div><div><p class="rx-lbl">Current Priority</p><p class="rx-val">'+(fMap[d.wk]||fMap.general)+'</p></div></div>'+
    '<div class="rx-row"><div class="rx-ico" style="background:var(--adim)">&#9201;</div><div><p class="rx-lbl">Prescribed Time</p><p class="rx-val">'+(tMap[d.wk]||tMap.general)+'</p></div></div>'+
    '<div class="rx-row"><div class="rx-ico" style="background:var(--gdim)">&#10003;</div><div><p class="rx-lbl">Success Goal</p><p class="rx-val">'+(gMap[d.wk]||gMap.general)+'</p></div></div>'+
    '<div class="rx-row"><div class="rx-ico" style="background:var(--pdim)">&#9654;</div><div><p class="rx-lbl">Retrain Starting Point</p><p class="rx-val">'+d.retrain.label+'</p><p class="rx-sub">Not from the beginning. From your weakest dimension.</p></div></div>'+
    '</div>'+
    '<div class="promise">'+
    '<p class="promise-lbl">Coach's Promise</p>'+
    '<p class="promise-txt">'+d.promTxt+'</p>'+
    '<p class="promise-sig">- Math +/- Relation Coaching System</p>'+
    '</div>'+
    '<div class="card" style="margin-bottom:14px">'+
    '<p class="ey gr">What happens next?</p>'+
    '<p style="font-size:13px;color:var(--tx2);line-height:1.8">Retrain at your weakest point - the system drops you into <strong style="color:var(--tx)">'+d.retrain.label+'</strong>, skipping what you already mastered. Or restart the full mission.</p>'+
    '</div>'+
    '<button class="retrain-btn" onclick="retrain()">Retrain Weakest Dimension &rarr;</button>'+
    '<button class="restart-btn" onclick="resetAll()">Restart Full Mission From Beginning</button>'+
    '<div class="div"></div>'+
    '<p class="philo">The assessment is not the destination.<br><span>It is the starting line.</span></p>';
}

function retrain() {
  if(!adData) return;
  var r=adData.retrain;
  if(r.phase===2){visited={};activePart='center';}
  if(r.phase===4){lvlIdx=r.level>=0?r.level:0;for(var i=lvlIdx;i<6;i++)pScores[i]=null;}
  if(r.phase===5){appScore=null;}
  go(r.phase);
}

function resetAll() {
  CUR=0;dScores=[null,null,null];pScores=[null,null,null,null,null,null];
  appScore=null;diagIdx=0;lvlIdx=0;visited={};activePart='center';adData=null;
  go(0);
}

// Boot
drawBrief();
</script>
